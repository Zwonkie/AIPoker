version: "v17_gauntlet"
training:
  # --- Discretized bet-size action space (inherited from V14, UNCHANGED) --------------
  # The raise buckets the hero (and per-size EV targets) use, as pot fractions; `null` = ALL-IN.
  raise_pot_fractions: [0.33, 0.66, 1.0, null]   # 0.33/0.66/1.0 pot + all-in
  # v17_gauntlet: full 200k production budget (up from V17's 100k test), same actor-critic
  # recipe as V17 (deployed live) -- the ONE variable this run changes is the opponent pool
  # (widened to include frozen V15/V16 as genuinely skilled opponents, not just heuristics +
  # a single frozen predecessor). See versions/v17_gauntlet/SPECS.md.
  target_hands: 200000
  batch_size: 256
  epochs_per_batch: 3
  sim_batch_size: 2000
  learning_rate: 0.001
  equity_sims: 2000   # reverted from V17's 5000 -- see versions/v18/SPECS.md "MC equity_sims
                       # budget" (measured 2.46x wall-clock cost for a ~0.3pt noise reduction,
                       # small next to the critic's own much more powerful denoising)
  mid_flight_diagnostics_interval: 10000
  checkpoint_dump_interval: 25000   # distinct restore-point checkpoint every N hands (weights/checkpoints/)
  # --- Training knobs: IDENTICAL to V17's validated recipe (do NOT change here) --------
  aux_loss_weight: 0.0          # 0 = bluff/strength/equity heads OFF
  disable_target_shaping: true  # preflop tightness prior off; COUNTERFACTUAL_WEIGHT always ON (V17 fix)
  target_clip_bb: 40.0          # VARIANCE clip -- KEEP ON (removing it diverged the critic)
  disable_bootstrap: false      # heuristic warmup generates good-play examples (decays by 30k)
  disable_exploration: false    # 5% random + heuristic anchor -> model visits diverse states
  policy_target_source: counterfactual  # 'realized' (legacy) | 'counterfactual'
  range_aware_equity: true      # hero equity vs each opp's VPIP-color range (opponent adaptation)
  policy_tightness_bb: 2.0      # realization discount on the actor target
  ablate_hole_cards: false
  policy_target_temperature: 1.0
  policy_entropy_penalty: 0.0

curriculum:
  # UNCHANGED from V17's validated recipe -- the opponent pool is already the one variable this
  # run tests; changing the curriculum at the same time would confound the comparison.
  phase_1_max_hands: 10000
  phase_1_stacks: [100.0]
  phase_5_focus_rounds: true
  disable_extreme_stacks: true  # the old 10-300bb fat-tail curriculum stays OFF
  # V15 DoN-SHAPED depth MIXTURE. Per hand, pick a band by weight then sample a uniform depth
  # within it — short-weighted with a real deep tail so ONE model covers the whole DoN arc.
  #   [lo_bb, hi_bb, weight]
  stack_depth_mix:
    - [5, 14, 0.55]     # late-game short (v14's proven zone — kept dense)
    - [14, 30, 0.30]    # mid-game
    - [30, 50, 0.15]    # early-game deep tail
  # fixed_stack_bb intentionally UNSET so stack_depth_mix takes over.

# --- Opponent lineup (v17_gauntlet: widened frozen-opponent pool, V18 [P0-adjacent] item) -----
# 'nit' and 'tag' repurposed to load STATIC frozen experts (frozen_v15.pth / frozen_v16.pth)
# instead of pure heuristics -- UNFORCED (simulator.py's style-forcing logic is bypassed
# whenever a real model is loaded, so these two genuinely play their own learned game, not a
# stereotyped nit/tag pattern). 'past' is a TRUE LAGGED SELF-PLAY MIRROR of v17_gauntlet's own
# training history (freeze_past_self: false) -- NOT a frozen file. 'fish'/'maniac' stay pure
# scripted heuristics for continued non-NN diversity.
opponents:
  pool: ["fish", "maniac", "nit", "tag", "past"]
  weights: [0.25, 0.15, 0.20, 0.20, 0.20]
  live_players: 6                        # 6-max to match live tables
  disable_past_self: false               # ENABLE the past seat...
  freeze_past_self: false                # ...as a TRUE lagged mirror (not a static frozen file)
  nit_model_filename: frozen_v15.pth     # 'nit' seat -> frozen V15, unforced
  tag_model_filename: frozen_v16.pth     # 'tag' seat -> frozen V16, unforced
  disable_focus_rounds: true             # unchanged from V17 -- keep the field composition constant
