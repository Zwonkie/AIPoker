version: "v20"
training:
  # --- Discretized bet-size action space (inherited from V14, UNCHANGED) --------------
  # The raise buckets the hero (and per-size EV targets) use, as pot fractions; `null` = ALL-IN.
  raise_pot_fractions: [0.33, 0.66, 1.0, null]   # 0.33/0.66/1.0 pot + all-in
  # V20: rescales the stack/pot/call-amount context features (ctx[1]/ctx[2]/ctx[9]) to fit the
  # actual 5-50bb training range -- see SPECS.md. Production budget -- for a smoke test, override
  # with `--num_hands <small>` on the CLI rather than editing this value.
  target_hands: 200000
  batch_size: 256
  epochs_per_batch: 3
  sim_batch_size: 2000
  learning_rate: 0.001
  equity_sims: 2000
  mid_flight_diagnostics_interval: 5000
  checkpoint_dump_interval: 25000   # distinct restore-point checkpoint every N hands (weights/checkpoints/)
  # --- Training knobs: IDENTICAL to V17/V17_gauntlet's validated recipe (do NOT change here) ---
  aux_loss_weight: 0.0          # 0 = bluff/strength/equity heads OFF
  disable_target_shaping: true  # preflop tightness prior off; COUNTERFACTUAL_WEIGHT always ON (V17 fix)
  target_clip_bb: 40.0          # VARIANCE clip -- KEEP ON (removing it diverged the critic)
  disable_bootstrap: false      # heuristic warmup generates good-play examples (decays by 30k)
  disable_exploration: false    # 5% random + heuristic anchor -> model visits diverse states
  policy_target_source: counterfactual  # 'realized' (legacy) | 'counterfactual'
  range_aware_equity: true      # hero equity vs each opp's VPIP-color range (opponent adaptation)
  policy_tightness_bb: 2.0      # realization discount on the actor target
  ablate_hole_cards: false
  policy_target_temperature: 1.0
  policy_entropy_penalty: 0.0

curriculum:
  # UNCHANGED from V17/V17_gauntlet's validated recipe -- this pass only refactors the opponent
  # PLUMBING, not the training recipe itself.
  phase_1_max_hands: 10000
  phase_1_stacks: [100.0]
  phase_5_focus_rounds: true
  disable_extreme_stacks: true  # the old 10-300bb fat-tail curriculum stays OFF
  # V15 DoN-SHAPED depth MIXTURE. Per hand, pick a band by weight then sample a uniform depth
  # within it — short-weighted with a real deep tail so ONE model covers the whole DoN arc.
  #   [lo_bb, hi_bb, weight]
  stack_depth_mix:
    - [5, 14, 0.55]     # late-game short (v14's proven zone — kept dense)
    - [14, 30, 0.30]    # mid-game
    - [30, 50, 0.15]    # early-game deep tail
  # fixed_stack_bb intentionally UNSET so stack_depth_mix takes over.

# --- Opponent lineup (V18: DECLARATIVE format, opponents.py's build_opponent_pool) -------------
# V20 SCOPE DECISION: 'nit'/'tag' reverted from frozen V15/V16 checkpoints back to plain
# HeuristicOpponent archetypes (unlike every version since v17_gauntlet). Reason: V20 rescales
# the context-feature normalization (contract.py ctx[1]/ctx[2]/ctx[9]/opp_stack, see SPECS.md) --
# every model query, hero's own AND every opponent NN's, funnels through the SAME simulator-wide
# contract instance, so a frozen V15/V16 checkpoint (trained on the OLD /400 scale) would silently
# receive WRONGLY-SCALED inputs under the new /100 scale -- not a crash, a quiet corruption of that
# opponent's actual behavior (its stack/pot perception would read ~4x too large). Properly
# supporting mixed-scale frozen opponents needs a per-model contract-selection mechanism (query
# each NNOpponent through the contract IT was trained under, not the querying version's own) --
# out of scope for this pass, flagged as backlog. 'past' (lagged self-play mirror) is UNAFFECTED
# by this issue -- it's always a snapshot of THIS run's own hero weights, so it's always on the
# current (new) scale by construction. This isolates the rescale as the one true variable for V20,
# same "one variable per version" discipline as V15/V16/etc.
#
# Each pool entry: {style, weight, model?, forced?, lagged_self?}
#   - model: a checkpoint filename (resolved against this version's weights/ dir) -> NNOpponent,
#     UNFORCED by default (a real trained network keeps its own tendencies; forcing it toward an
#     archetype stereotype is an explicit opt-in via forced: true, not the default). AVOID using
#     this for any checkpoint from a DIFFERENT context-contract scale than this version's own --
#     see the V20 note above.
#   - lagged_self: true -> 'past' only; a TRUE lagged self-play mirror, refreshed every 5k hands
#     (NOT a static file -- mutually exclusive with 'model' on the same entry).
#   - neither model nor lagged_self -> HeuristicOpponent (scripted archetype bot), forced=true.
opponents:
  pool:
    - style: fish
      weight: 0.25
    - style: maniac
      weight: 0.15
    - style: nit
      weight: 0.20
    - style: tag
      weight: 0.20
    - style: past
      weight: 0.20
      lagged_self: true
  live_players: 6                        # 6-max to match live tables
  disable_focus_rounds: true              # unchanged from V17/V17_gauntlet -- keep the field composition constant
