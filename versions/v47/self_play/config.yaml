version: "v47"
training:
  # --- Discretized bet-size action space (inherited from V14, UNCHANGED) --------------
  # The raise buckets the hero (and per-size EV targets) use, as pot fractions; `null` = ALL-IN.
  raise_pot_fractions: [0.33, 0.66, 1.0, null]   # 0.33/0.66/1.0 pot + all-in
  # [V23] Branches from V22 (context_dim=43, contract_version=6), which is inherited unchanged
  # here otherwise (deep-stack curriculum, entry-sizing features, training recipe, aux-head config
  # all identical -- see versions/v22/SPECS.md). V23 makes exactly TWO additions:
  #   1. [BET-1] opponent price-sensitivity fix (`opponent_bots.py`): FuzzyPlayerArchetype's
  #      "value raise regardless of price" branch is now size-aware (VALUE_PRICE_SENSITIVITY=0.05,
  #      calibrated via a standalone probe -- see opponent_bots.py's own docstring for the full
  #      derivation and the per-archetype numbers that ruled out larger values). This is an
  #      OPPONENT-POOL behavior change, not a contract change -- it changes what hero trains
  #      against from hand 0, so it needs a real retrain to show any effect (no cheap warm-start
  #      test the way the aux-head weights had).
  #   2. `pot_type` feature (deferred from V22): one new APPENDED context feature (contract_version
  #      6->7, context_dim 43->44) -- whole-hand raise count so far, bucketed 0=limped/
  #      1=single-raised/2=3-bet+. See contract.py and versions/v23/SPECS.md.
  # This is NOT another aux-head experiment -- that thread closed with V21_auxhead.
  # aux_loss_weight/per-head weights below are carried over UNCHANGED (already validated).
  #
  # [V25] The 50k-hand fast diagnostic (see versions/v25/SPECS.md "Results" section) came back as
  # the best result of the whole BET-1 investigation -- tightest allin-vs-next-best Q-gap ever
  # measured (1.35-1.36x, beating even V24_extreme's extreme-parameter 1.60-1.76x), AND
  # `vpip_adapts_to_style` still PASSES (V24_extreme broke this to get its own, less-good gap).
  # Backed up to weights/frozen_v25_50k_diag.pth before this longer run. Raised 50000 -> 100000
  # (the ceiling explicitly authorized for this follow-up, not the lineage's usual 150000) as a
  # from-scratch confirmatory run -- fresh weights, no --resume_path, per [VAL-5] -- to check this
  # result holds up with more training exposure before considering deployment.
  target_hands: 100000
  batch_size: 256
  epochs_per_batch: 3
  sim_batch_size: 2000
  learning_rate: 0.001
  equity_sims: 2000
  mid_flight_diagnostics_interval: 5000
  checkpoint_dump_interval: 20000   # matches V21/V21_auxhead's own cadence for a like-for-like comparison
  # --- Training knobs ---
  # [V21_auxhead, inherited unchanged] aux heads validated over Phases 1-8 -- see
  # versions/v21_auxhead/SPECS.md for the full derivation of these numbers. Not touched by V22.
  aux_loss_weight: 0.05    # fallback default for any head without its own override below
  aux_loss_weight_strength: 0.10   # [V21_auxhead Phase 7 conclusion] best overall balance across all three heads
  aux_loss_weight_bluff: 0.05
  aux_loss_weight_equity: 0.05
  # [V21] disable_target_shaping REMOVED -- the preflop-entry tightness prior it gated
  # (TIGHTNESS_PENALTY_BB/ENTRY_EQUITY_MARGIN) has been deleted outright, not just left at 0. See
  # versions/v21/SPECS.md item 1: superseded by range-aware equity, and validated dormant since V17 anyway.
  # [V43] 40.0 -> 100.0. The clip STAYS ON (removing it diverged the critic) -- only its ceiling
  # moved, to match core/contract.py's STACK_CEIL_BB=100 and the top of stack_depth_mix. At 40 it
  # truncated 23.4% of realized go-forward returns (measured, 600 hands), so a 100bb stack-off and
  # a 40bb loss trained identical targets -- review finding T-M5. At 100 it truncates ~6%. Safe on
  # gradients because the critic loss is HuberLoss(delta=2.0): per-sample gradient magnitude
  # saturates at 2bb of error either way. See train.py's TARGET_CLIP_BB note.
  target_clip_bb: 100.0
  disable_bootstrap: false      # heuristic warmup generates good-play examples (decays by 20k)
  disable_exploration: false    # 5% random + 95% model
  policy_target_source: counterfactual  # 'realized' (legacy) | 'counterfactual'
  range_aware_equity: true      # hero equity vs each opp's VPIP-color range (opponent adaptation)
  # [V43] `policy_tightness_bb` (realization discount, V12) REMOVED -- the key is gone, not zeroed,
  # and train.py RAISES if it is still present, so this cannot silently become a no-op.
  ablate_hole_cards: false
  policy_target_temperature: 1.0
  policy_entropy_penalty: 0.0
  # [V28, BET-1] Risk/variance penalty on _mc_target_evs_sized's per-size EV target -- subtracts
  # coefficient*sqrt(Var[X]) from EVERY sized action's EV (raise_33/raise_66/raise_pot/allin
  # alike), not an all-in-special-case. All-in's naturally larger raise_size gives it a naturally
  # larger variance, so the SAME coefficient penalizes it the most. 0.0 = off (V27's behavior).
  # See versions/v28/SPECS.md for the calibration run that chose this value.
  # [V43] 0.15 -> 0.20, REQUIRED BY the target_clip_bb change above -- these two are not
  # independent knobs. The 40bb clip was acting as an undeclared deep-stack all-in dampener: it
  # truncated a 100bb stack-off to 40bb, so ALLIN's edge at depth was hidden and 0.15 only ever had
  # to cover what the clip left over. Measured (ablate_dampeners.py, ALLIN-vs-next-best gap trend
  # across 5->100bb): V41 +1.39 | clip=100 @ risk 0.15 +6.53 | @ 0.20 +1.05 | @ 0.25 -0.03 |
  # @ 0.35 -0.10. 0.20 restores V41's damping in the new scale. 0.25+ was NOT taken: a single-cell
  # trace (AhKh, eq 0.75, 100bb) shows ALLIN going 13.4 -> 10.4 -> 7.3 -> 1.3bb as the coefficient
  # rises, i.e. by 0.35 ALLIN is DOMINATED (1.3 vs raise_pot's 3.1) -- that risks the opposite
  # pathology (never jamming), and the aggregate metric sits at its zero-crossing there so it
  # cannot discriminate reliably. Verified no target is driven into the clip at any of these values.
  # Same one-step, same-direction discipline as the documented 0.10 -> 0.15 move.
  risk_aversion_coefficient: 0.20  # [V29] bumped 0.10->0.15 -- V28's own model_verify --full still
                                    # FAILed deep_stack_ood_guard at eq>=0.48 with the critic's Q
                                    # itself ranking ALLIN as the genuine best action there (verified
                                    # directly against the frozen V28 checkpoint's raw Q-values,
                                    # scratchpad/calibrate_critic_consistency.py) -- 0.10 wasn't
                                    # enough pushback on the target itself at that equity band. Not
                                    # independently re-calibrated via the full 40-trial-average
                                    # procedure (time-boxed this pass) -- a moderate, same-direction
                                    # step from the one value that IS calibrated (0.10), re-evaluate
                                    # via model_verify --full and iterate again if still failing.
  # [V43] `critic_consistency_margin` (the V29 ALLIN critic-consistency veto) REMOVED, same as
  # policy_tightness_bb above: the key is gone rather than set to 0, and train.py raises if it
  # reappears. Measured near-inert before removal (ALLIN target share 0.37-0.43 with the veto,
  # 0.41-0.43 without) -- consistent with V40's finding that its rescope was a provable no-op under
  # the fold baseline. `risk_aversion_coefficient` above is the one dampener V43 KEEPS, because the
  # same ablation showed its pathology is not gone at the source.
  # See versions/v43/SPECS.md and versions/v43/self_play/ablate_dampeners.py.

curriculum:
  # UNCHANGED from V17/V17_gauntlet's validated recipe otherwise -- this pass only widens the
  # stack-depth curriculum ([STACK-2], see above), not the training recipe itself.
  phase_1_max_hands: 10000
  phase_1_stacks: [100.0]
  phase_5_focus_rounds: true
  disable_extreme_stacks: true  # the old 10-300bb fat-tail curriculum stays OFF
  # [V22] Widened DoN-shaped depth MIXTURE. Per hand, pick a band by weight then sample a uniform
  # depth within it. The last band (10-100bb) deliberately OVERLAPS the others (not a disjoint
  # 60-100bb bucket) so there's no training-density cliff at the seam between bands -- every depth
  # from 10bb to 100bb gets SOME density, not just the four nominal buckets. Reaches the new
  # STACK_CEIL_BB=100 ceiling (see core/contract.py) for the first time in this lineage.
  # [V47, Change 4 / VAL-1(A)] Sub-5bb floor + 5-8bb upweight. [VAL-1] Finding A quantified the
  # gap: BB demands ~2x the price-edge before calling jams at 5-6bb -- a TRAINING-FLOOR artifact
  # (5bb was the thin bottom edge of the lowest band, so genuinely desperate stacks were nearly
  # absent from training), not a feature/target bug. New overlapping 2-5bb band (~0.08, the
  # [STACK-2] overlapping-band precedent) + an explicit 5-8bb band; the other bands scale down
  # proportionally. Weights sum to 1.00. No formula/contract change (STACK_CEIL untouched).
  #   [lo_bb, hi_bb, weight]
  stack_depth_mix:
    - [2, 5, 0.08]      # [V47] desperation zone -- was almost never dealt before
    - [5, 8, 0.07]      # [V47] explicit density where VAL-1(A) measured the miscalibration
    - [5, 14, 0.35]     # late-game short (v14's proven zone — kept dense)
    - [14, 30, 0.25]    # mid-game
    - [30, 60, 0.17]    # early-game deep
    - [10, 100, 0.08]   # OVERLAPPING deep tail -- real exposure up to the new 100bb ceiling
  # fixed_stack_bb intentionally UNSET so stack_depth_mix takes over.

# --- Opponent lineup (V18: DECLARATIVE format, opponents.py's build_opponent_pool) -------------
# [V22] `maniac`/`fish` REVERTED to plain heuristics (were V20_preflopEq's frozen_50k.pth/
# frozen_25k.pth NN checkpoints in V21_auxhead/V21/V20_preflopEq_AI). Those checkpoints are
# context_dim=37/contract_version=5 -- V22's OWN context_dim=43/contract_version=6 means
# `_query_model_decide` now builds a 43-dim context for EVERY queried model, which would shape-
# mismatch-crash a 37-dim-input frozen checkpoint. This is the exact same situation V20 itself hit
# with ITS OWN rescale (see the historical note below) -- same precedented fix: fall back to plain
# heuristics for any opponent seat that isn't natively on this version's own scale. `past` (lagged
# self-play mirror of THIS run) is unaffected -- it's always version-native by construction.
#
# NOTE on `style` keys: `maniac`/`fish` here DO play as those heuristic archetypes now (unlike
# V21_auxhead, where they were repurposed NN-model slots) -- see opponents.py's own docstring for
# the general slot-repurposing mechanism, not in use here.
#
# [Historical V20 note] 'nit'/'tag' were reverted to plain heuristics in V20 because its OWN
# context rescale made every prior-version frozen checkpoint receive wrongly-scaled inputs --
# exactly the same mechanism now hitting `maniac`/`fish` here in V22.
#
# Each pool entry: {style, weight, model?, forced?, lagged_self?}
#   - model: a checkpoint filename (resolved against this version's weights/ dir) -> NNOpponent,
#     UNFORCED by default (a real trained network keeps its own tendencies; forcing it toward an
#     archetype stereotype is an explicit opt-in via forced: true, not the default).
#   - lagged_self: true -> 'past' only; a TRUE lagged self-play mirror, refreshed every 5k hands
#     (NOT a static file -- mutually exclusive with 'model' on the same entry).
#   - neither model nor lagged_self -> HeuristicOpponent (scripted archetype bot), forced=true.
# [V26] `tree_cluster: <id>` -- a REAL-DATA opponent (TreeOpponent, versions/v25/self_play/
# tree_opponent.py): an XGBoost model fit directly on human hand-history decisions (Pluribus/WSOP
# full-info hands), not a hand-designed formula and not anything trained inside this simulator's
# own self-play loop. `maniac`/`nit` swapped to this for the experiment (see this version's own
# manifest.py for the full rationale); `style`'s heuristic bot is still resolved as the
# recording_bot/fallback (unchanged interface -- see build_opponent_pool). Cluster ids 0-3 map to
# `versions/v25/weights/tree_opponents/xgb_cluster_{id}.json` (reused directly, not retrained per
# version -- these are fit from external data, not this simulator's own runs).
opponents:
  pool:
    - style: past                # NN: lagged self-play mirror of THIS run, refreshed every 5k hands
      weight: 0.25
      lagged_self: true
    - style: maniac               # [V26] REAL-DATA (TreeOpponent, cluster 0) -- was Heuristic in V22-V25
      weight: 0.20
      tree_cluster: 0
    - style: fish                 # Heuristic (see note above -- was an NN slot in V21_auxhead)
      weight: 0.15
    - style: tag                  # Heuristic anchor
      weight: 0.25
    - style: nit                  # [V26] REAL-DATA (TreeOpponent, cluster 3) -- was Heuristic in V22-V25
      weight: 0.15
      tree_cluster: 3
  live_players: 6                        # 6-max to match live tables
  disable_focus_rounds: true              # unchanged from V17/V17_gauntlet -- keep the field composition constant
